<button
    [attr.type]="type()"
    data-mdb-button-init
    data-mdb-ripple-init
    class="btn btn-outline-{{ color() }} btn-lg button-font-size"
    style="padding-left: 2.3rem; padding-right: 2.3rem"
    [ngClass]="customClasses()"
    [disabled]="disabled()"
    (click)="handleClick()"
>
    {{ label() }}
</button>
